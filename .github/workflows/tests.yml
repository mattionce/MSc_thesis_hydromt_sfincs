name: Tests

on:
  push:
    branches:
      - main
      - release/*
    paths:
      - hydromt_sfincs/**/*
      - tests/**/*
      - pyproject.toml
      - .github/workflows/tests.yml
  pull_request:
    branches:
      - main
      - release/*
    paths:
      - hydromt_sfincs/**/*
      - tests/**/*
      - pyproject.toml
      - .github/workflows/tests.yml

jobs:
  build:
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.11','3.12'] #,'3.13']
        dependencies: ['full'] # ['min']

    name: pytest ${{ matrix.dependencies }}-${{ matrix.python-version }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    concurrency:
      group: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.python-version }}-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        id: pip
        with:
          # caching, see https://github.com/actions/setup-python/blob/main/docs/advanced-usage.md#caching-packages
          cache: 'pip'
          cache-dependency-path: pyproject.toml
          python-version: ${{ matrix.python-version }}

      # true if cache-hit occurred on the primary key
      - name: Cache hit
        run: echo '${{ steps.pip.outputs.cache-hit }}'

      # build environment with pip
      - name: Install hydromt-sfincs
        run: |
          pip install --upgrade pip
          pip install .[test,examples,quadtree]
          pip list

      # run test
      - name: Test
        run: |
          export NUMBA_DISABLE_JIT=1
          python -m pytest -vv -s --cov=hydromt_sfincs --cov-report xml

      # upload coverage
      - uses: codecov/codecov-action@v3
