global:
  data_libs:
    - artifact_data
    - local_data.yml

steps:
  - config.update:
      tref: 20100201 000000
      tstart: 20100205 000000
      tstop: 20100207 000000
      dtmapout: 86400.0
      dthisout: 86400.0
      tspinup: 0.0
      dtrstout: 0.0

  - grid.create_from_region:
      region:
        geom: region
      res: 150                       # model resolution
      crs: utm                       # model CRS (must be UTM zone)
      rotated: True                  # allow a rotated grid

  - elevation.create:
      elevation_list:
        - elevation: merit_hydro
          zmin: 0.001
        - elevation: gebco

  - mask.create_active:
      zmin: -5

  - mask.create_boundary:
      btype: waterlevel
      zmax: -1

  - subgrid.create:
      elevation_list:
        - elevation: merit_hydro
          zmin: 0.001
        - elevation: gebco
      roughness_list:
        - lulc: vito_2015
          reclass_table: vito_mapping
      write_dep_tif: True
      nr_subgrid_pixels: 6
      nr_levels: 8

  - observation_points.create:
      locations: observations

  - cross_sections.create:
      locations: observation_lines

  - thin_dams.create:
      locations: weir

  - weirs.create:
      locations: weir

  - drainage_structures.create:
      locations: drainage

  - rivers.create_river_inflow:
      hydrography: merit_hydro
      buffer: 100
      river_upa: 10
      river_len: 1000
      keep_rivers_geom: True

  - discharge_points.create:
      timeseries: discharge

  - water_level.create:
      geodataset: gtsmv3_eu_era5
      buffer: 2000                                                     # m: find points within 2 km of waterlevel boundary

  - precipitation.create:
      precip: era5_hourly
      aggregate: False
      buffer: 10

  - wind.create_uniform:
      timeseries: wind
