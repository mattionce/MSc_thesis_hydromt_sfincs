region:
  uri: region.geojson
  data_type: GeoDataFrame
  driver: pyogrio

observations:
  uri: local_data/observations.csv
  data_type: GeoDataFrame
  driver:
    name: geodataframe_table
  metadata:
    crs: 4326

discharge:
  uri: local_data/discharge.csv
  data_type: DataFrame
  driver:
    name: pandas
    options:
      index_col: 0
      parse_dates: true

wind:
  uri: local_data/wind.csv
  data_type: DataFrame
  driver:
    name: pandas
    options:
      index_col: 0
      parse_dates: true

weir:
  uri: local_data/weir.geojson
  data_type: GeoDataFrame
  driver: pyogrio

drainage:
  uri: local_data/drainage.geojson
  data_type: GeoDataFrame
  driver: pyogrio

observation_lines:
  uri: local_data/observation_lines.geojson
  data_type: GeoDataFrame
  driver: pyogrio

vito_mapping:
  uri: local_data/vito_mapping.csv
  data_type: DataFrame
  driver:
    name: pandas
    options:
      index_col: 0
